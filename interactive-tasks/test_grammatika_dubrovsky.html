<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по грамматическому заданию — Дубровский, № 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f3f1e8;
    --rule: #c9d6e3;
    --margin: #e2a3a0;
    --ink: #233047;
    --ink-soft: #4b5a73;
    --red: #b5392f;
    --red-dark: #8c2a22;
    --green: #3f7a4f;
    --pencil: #7c7567;
    --gold: #b9912f;
    --blue: #2c5f8a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: repeating-linear-gradient(var(--paper) 0px, var(--paper) 33px, var(--rule) 34px);
    background-color: var(--paper);
    font-family:'PT Serif', serif;
    color: var(--ink);
  }
  .page{
    max-width: 760px; margin: 0 auto; position: relative;
    padding: 28px 28px 50px 64px; min-height: 100vh;
  }
  .margin-line{ position:absolute; left:42px; top:0; bottom:0; width:2px; background:var(--margin); }
  header{ margin-bottom: 18px; }
  .eyebrow{
    font-family:'Courier Prime', monospace; font-size:12px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--pencil);
  }
  h1{ font-family:'Caveat', cursive; font-weight:700; font-size:40px; line-height:1.05; margin:4px 0 6px; }
  .subtitle{ color:var(--ink-soft); font-style:italic; font-size:15px; margin:0; }

  .progress{ display:flex; gap:6px; margin: 18px 0 22px; flex-wrap:wrap; }
  .clip{
    width:22px; height:22px; border-radius:50%; border:2px solid var(--rule);
    display:flex; align-items:center; justify-content:center;
    font-family:'Courier Prime', monospace; font-size:10px; color:var(--pencil);
    background: rgba(255,255,255,.4);
  }
  .clip.done{ border-color: var(--green); color: var(--green); background: rgba(63,122,79,.08); }
  .clip.miss{ border-color: var(--red); color: var(--red); background: rgba(181,57,47,.08); }
  .clip.active{ border-color: var(--red); color: var(--red); box-shadow: 0 0 0 3px rgba(181,57,47,.12); }

  .card{
    background: rgba(255,255,255,.55); border: 1px solid var(--rule); border-radius: 4px;
    padding: 22px 22px 18px; margin-bottom: 18px;
  }
  .qnum{ font-family:'Courier Prime', monospace; color:var(--red); font-size:13px; margin-bottom:6px; }
  .qtext{ font-size: 18px; line-height: 1.45; margin: 0 0 14px; }
  .qtext i{ color: var(--blue); font-style: italic; }
  .qhint{ font-size: 14px; color: var(--ink-soft); margin: -8px 0 14px; }

  /* punctuation text */
  .ptext{
    background: rgba(255,255,255,.5); border: 1px dashed var(--rule); border-radius: 4px;
    padding: 16px 18px; margin-bottom: 14px; font-size: 16.5px; line-height: 2.1;
  }
  .ptext p{ margin: 0 0 12px; }
  .slot{
    display:inline-block; min-width: 10px; text-align:center; cursor:pointer;
    color: var(--rule); font-weight:700; font-size: 17px; user-select:none;
    transition: color .12s;
  }
  .slot.selected{ color: var(--ink); }
  .slot.ok{ color: var(--green); cursor:default; }
  .slot.wrong{ color: var(--red); text-decoration: line-through; cursor:default; }
  .slot.missed{ color: var(--gold); cursor:default; }
  .legend-p{
    display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--ink-soft); margin-bottom:14px;
  }
  .legend-p b{ font-weight:700; }

  /* options (mcq) */
  .opt{
    display:block; width:100%; text-align:left; background:transparent;
    border:1.5px solid var(--rule); border-radius:3px; padding:10px 14px; margin-bottom:9px;
    font-family:'PT Serif', serif; font-size:16px; color:var(--ink); cursor:pointer;
    transition: border-color .15s, background .15s; position:relative;
  }
  .opt:hover{ border-color: var(--ink-soft); }
  .opt:disabled{ cursor:default; }
  .opt.correct{ border-color: var(--green); background: rgba(63,122,79,.08); }
  .opt.wrong{ border-color: var(--red); background: rgba(181,57,47,.07); }
  .opt.correct::after{ content:"✓"; position:absolute; right:14px; top:50%; transform:translateY(-50%) rotate(-6deg); color:var(--green); font-family:'Caveat',cursive; font-size:24px; font-weight:700; }
  .opt.wrong::after{ content:"✗"; position:absolute; right:14px; top:50%; transform:translateY(-50%) rotate(6deg); color:var(--red); font-family:'Caveat',cursive; font-size:24px; font-weight:700; }

  /* matching */
  .mrow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex-wrap: wrap; padding: 10px 0; border-bottom: 1px dashed var(--rule);
  }
  .mrow:last-child{ border-bottom:none; }
  .mphrase{ font-size: 16px; font-style: italic; color: var(--ink); flex: 1 1 180px; }
  .mbtns{ display:flex; gap:6px; flex-wrap:wrap; }
  .mbtn{
    font-family:'Courier Prime', monospace; font-size: 12.5px;
    border: 1.5px solid var(--rule); background: transparent; color: var(--ink-soft);
    padding: 5px 9px; border-radius: 3px; cursor:pointer;
  }
  .mbtn.picked{ border-color: var(--ink); color: var(--ink); background: rgba(35,48,71,.06); }
  .mbtn.ok{ border-color: var(--green); color: var(--green); background: rgba(63,122,79,.1); }
  .mbtn.wrong{ border-color: var(--red); color: var(--red); background: rgba(181,57,47,.08); }
  .mnote{ font-size: 12.5px; color: var(--gold); width: 100%; margin-top: 4px; display:none; }
  .mnote.show{ display:block; }

  /* transform question */
  .trow{ padding: 14px 0; border-bottom: 1px dashed var(--rule); }
  .trow:last-child{ border-bottom: none; }
  .tphrase{ font-size: 16px; margin-bottom: 8px; }
  .ttype{ font-family:'Courier Prime', monospace; font-size: 12px; color: var(--ink-soft); }
  .ttype.target{ color: var(--blue); font-weight: 700; }
  .tinput{
    width: 100%; font-family:'PT Serif', serif; font-size: 15.5px; color: var(--ink);
    background: rgba(255,255,255,.6); border: 1.5px solid var(--rule); border-radius: 3px;
    padding: 8px 12px; margin-bottom: 8px;
  }
  .tinput:disabled{ opacity: .7; }
  .trow-controls{ display:flex; align-items:center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .reveal-sample{
    font-family:'Courier Prime', monospace; font-size: 12.5px; background: transparent;
    border: 1px solid var(--gold); color: var(--gold); border-radius: 3px; padding: 5px 10px; cursor: pointer;
  }
  .reveal-sample:hover{ background: rgba(185,145,47,.08); }
  .sample{ font-size: 14.5px; font-style: italic; color: var(--ink-soft); display:none; }
  .sample.show{ display:inline; }
  .self-grade{ display:flex; gap: 8px; }
  .gbtn{
    font-family:'Courier Prime', monospace; font-size: 12.5px; border: 1.5px solid var(--rule);
    background: transparent; color: var(--ink-soft); padding: 5px 10px; border-radius: 3px; cursor: pointer;
  }
  .gbtn.ok.picked{ border-color: var(--green); color: var(--green); background: rgba(63,122,79,.1); }
  .gbtn.bad.picked{ border-color: var(--red); color: var(--red); background: rgba(181,57,47,.08); }
  .gbtn:disabled{ cursor: default; }

  .feedback{
    margin-top: 12px; padding: 10px 14px; border-radius: 3px; border: 1px solid transparent; font-size: 15px; line-height: 1.5; display:none;
  }
  .feedback.show{ display:block; }
  .feedback.ok{ background: rgba(63,122,79,.08); color: var(--green); border-color: var(--green); }
  .feedback.bad{ background: rgba(181,57,47,.07); color: var(--red-dark); border-color: var(--red); }
  .feedback.mid{ background: rgba(185,145,47,.08); color: var(--red-dark); border-color: var(--gold); }

  .nav{ display:flex; justify-content: space-between; margin-top: 10px; align-items:center; }
  .btn{
    font-family:'Caveat', cursive; font-weight:700; font-size:19px; background:var(--ink); color:var(--paper);
    border:none; border-radius:3px; padding:7px 20px 9px; cursor:pointer; transform: rotate(-0.4deg);
  }
  .btn:hover{ background: var(--red-dark); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn.ghost{ background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }

  .result{ text-align:center; padding: 30px 10px; }
  .stamp{
    display:inline-flex; align-items:center; justify-content:center; width:130px; height:130px;
    border-radius:50%; border:4px solid var(--red); color:var(--red); font-family:'Caveat',cursive;
    font-weight:700; font-size:64px; transform: rotate(-8deg); margin:10px auto 18px; position:relative;
  }
  .stamp::before{ content:""; position:absolute; inset:-10px; border:1px dashed var(--red); border-radius:50%; opacity:.5; }
  .result-text{ font-size:17px; color:var(--ink-soft); max-width:480px; margin:0 auto; }
  .score-line{ font-family:'Courier Prime', monospace; color:var(--pencil); font-size:13px; margin-bottom:4px; }
  .hidden{ display:none; }
  .back-link{ font-family:'Courier Prime',monospace; font-size:12px; color:var(--pencil); text-decoration:none; letter-spacing:.05em; display:inline-block; margin-bottom:16px; }
  .back-link:hover{ color:var(--ink); }
  footer{ text-align:center; color:var(--pencil); font-size:12px; margin-top:26px; font-family:'Courier Prime', monospace; }

  @media (max-width: 480px) {
    .page { padding: 16px 14px 36px 36px; }
    .margin-line { left: 18px; }
    h1 { font-size: 28px; }
    .card { padding: 16px 14px 14px; }
    .qtext { font-size: 16px; }

    /* Пунктуация: слоты-запятые должны быть удобны для нажатия пальцем */
    .ptext { font-size: 15px; padding: 12px 14px; line-height: 2.6; }
    .slot { min-width: 28px; padding: 4px 5px; font-size: 18px; }
    .legend-p { flex-direction: column; gap: 4px; }

    /* Соответствие: сначала фраза, под ней кнопки */
    .mrow { flex-direction: column; align-items: flex-start; gap: 8px; }
    .mbtns { gap: 8px; }
    .mbtn { padding: 10px 16px; font-size: 14px; }

    /* Трансформация: кнопки достаточного размера */
    .trow-controls { flex-direction: column; align-items: flex-start; gap: 8px; }
    .reveal-sample { padding: 10px 16px; font-size: 14px; }
    .self-grade { gap: 10px; }
    .gbtn { padding: 10px 16px; font-size: 14px; }

    .nav { gap: 8px; }
    .btn { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="margin-line"></div>
  <a class="back-link" href="index.html">← Все задания</a>

  <header>
    <div class="eyebrow">Диктант № 4 · по А.С. Пушкину «Дубровский»</div>
    <h1>Тест по грамматическому заданию</h1>
    <p class="subtitle">Расставьте запятые и ответьте на вопросы по тексту диктанта.</p>
  </header>

  <div class="progress" id="progress"></div>
  <div id="quizArea"></div>

  <div class="card result hidden" id="resultCard">
    <div class="score-line" id="scoreLine"></div>
    <div class="stamp" id="stampGrade">5</div>
    <div class="result-text" id="resultText"></div>
    <div class="nav" style="justify-content:center; margin-top:18px;">
      <button class="btn ghost" id="retryBtn">Пройти заново</button>
    </div>
  </div>

  <footer>синтаксис · пунктуация · словосочетания · орфоэпия — диктант «Дубровский», № 4</footer>
</div>

<script>
/* ---------- punctuation text & slot key ---------- */
const slotMap = {
  '1': true,  '2': true,  'D1': false, '3': true,
  '4': true,  '5': true,  'D2': false, '6': true, '7': true, 'D3': false, '8': true,
  'D4': false, '9': true, '10': true, '11': true, '12': true, '13': true
};
const rawText = [
`Дубровский узнал эти места. Он вспомнил{{1}} что на этом самом холму он играл с маленькой Машей Троекуровой{{2}} которая была двумя годами его моложе. Он хотел{{D1}} о ней осведомиться у Антона{{3}} но какая-то застенчивость удержала его.`,
`Подъехав к господскому дому{{4}} он увидел белое платье{{5}} мелькнувшее между деревьями. В это время Антон ударил по лошадям{{D2}} и пустился во весь дух через мост и мимо села. Выехав из деревни{{6}} поднялись они на гору{{7}} и Владимир увидел берёзовую рощу{{D3}} и слева на открытом месте серенький домик с красной кровлей. Сердце в нём забилось{{8}} потому что перед собой увидел он Кистенёвку и бедный дом своего отца.`,
`Через десять минут въехал он на барский двор{{D4}} и посмотрел вокруг себя с волнением неописанным. Двенадцать лет не видел он своей родины. Берёзки{{9}} посаженные при нём около забора{{10}} стали теперь высокими ветвистыми деревьями. Двор{{11}} когда-то украшенный тремя цветниками{{12}} превратился в некошеный луг{{13}} на котором паслась опутанная лошадь.`
];

function buildPunctuationHtml(){
  return rawText.map(p => {
    let html = p;
    Object.keys(slotMap).forEach(id => {
      const re = new RegExp(`\\{\\{${id}\\}\\}`);
      html = html.replace(re, `<span class="slot" data-id="${id}" data-correct="${slotMap[id]}">⌄</span>`);
    });
    return `<p>${html}</p>`;
  }).join('');
}

/* ---------- questions ---------- */
const questions = [
  {
    type: 'punct',
    q: "Расставьте запятые в тексте диктанта. Нажимайте на значок ⌄ там, где, по вашему мнению, нужна запятая — он превратится в запятую. Когда будете готовы, нажмите «Проверить».",
    points: Object.values(slotMap).filter(v => v).length
  },
  {
    type: 'mcq',
    q: "В выделенном при анализе предложении «Подъехав к господскому дому, он увидел белое платье, мелькнувшее между деревьями» — какое слово является сказуемым?",
    opts: ["он", "увидел", "платье", "мелькнувшее"],
    correct: 1,
    points: 1,
    fb: { ok: "Верно. «Увидел» — сказуемое, обозначающее основное действие подлежащего «он».",
          bad: "Сказуемым здесь является слово «увидел» — оно называет действие подлежащего «он»." }
  },
  {
    type: 'mcq',
    q: "Обозначьте ударение в слове <i>осведомиться</i>. На какой слог падает ударение?",
    opts: ["на 2-й слог: о-СВЕ-до-мить-ся", "на 3-й слог: о-све-ДО-мить-ся", "на 4-й слог: о-све-до-МИТЬ-ся", "на последний слог: о-све-до-мить-СЯ"],
    correct: 0,
    points: 1,
    fb: { ok: "Верно: осве́домиться — ударение падает на второй слог, на «е» в «-све-».",
          bad: "Правильно: осве́домиться — ударение падает на второй слог, на «е» в «-све-» (а не на «до» или «мить»)." }
  },
  {
    type: 'match',
    q: "Определите тип связи в словосочетаниях из текста (согласование, управление или примыкание).",
    hint: "Это поможет вам выписать три словосочетания разных типов связи из задания учебника.",
    items: [
      { phrase: "белое платье", correct: "Согласование" },
      { phrase: "увидел платье", correct: "Управление" },
      { phrase: "ударил по лошадям", correct: "Управление" },
      { phrase: "стали теперь", correct: "Примыкание" },
      { phrase: "ветвистыми деревьями", correct: "Согласование" },
      { phrase: "пустился во весь дух", correct: "Примыкание" }
    ],
    points: 6
  },
  {
    type: 'mcq',
    q: "Определите тип связи в словосочетании «<i>господский дом</i>».",
    opts: ["Согласование", "Управление", "Примыкание"],
    correct: 0,
    points: 1,
    fb: { ok: "Верно. Прилагательное «господский» согласуется с существительным «дом» в роде, числе и падеже.",
          bad: "Это согласование: прилагательное «господский» изменяется вслед за существительным «дом» — в роде, числе, падеже." }
  },
  {
    type: 'mcq',
    q: "Определите тип связи в словосочетании «<i>хотел осведомиться</i>».",
    opts: ["Согласование", "Управление", "Примыкание"],
    correct: 2,
    points: 1,
    fb: { ok: "Верно. Инфинитив «осведомиться» — неизменяемая форма, она присоединяется к глаголу только по смыслу — это примыкание.",
          bad: "Это примыкание: инфинитив «осведомиться» неизменяем и присоединяется к глаголу «хотел» только по смыслу, без согласования и управления." }
  },
  {
    type: 'mcq',
    q: "Определите тип связи в словосочетании «<i>поднялись на гору</i>».",
    opts: ["Согласование", "Управление", "Примыкание"],
    correct: 1,
    points: 1,
    fb: { ok: "Верно. Глагол «поднялись» управляет существительным «гору», требуя винительного падежа с предлогом «на».",
          bad: "Это управление: глагол «поднялись» требует от существительного определённого падежа (винительный с предлогом «на»)." }
  },
  {
    type: 'transform',
    q: "Преобразуйте словосочетания, изменив тип подчинительной связи. Запишите свой вариант в поле, затем нажмите «Показать пример ответа», сравните и отметьте, получилось ли у вас.",
    items: [
      { phrase: "господский дом", fromType: "согласование", toType: "управление", sample: "дом господина" },
      { phrase: "дом отца", fromType: "управление", toType: "согласование", sample: "отцовский дом" },
      { phrase: "смотрел застенчиво", fromType: "примыкание", toType: "управление", sample: "смотрел с застенчивостью" },
      { phrase: "посмотрел с волнением", fromType: "управление", toType: "примыкание", sample: "посмотрел взволнованно" }
    ],
    points: 4
  }
];
let current = 0;
let totalScore = 0;
const totalMaxPoints = questions.reduce((s, q) => s + q.points, 0);
const answered = new Array(questions.length).fill(false);
const earned = new Array(questions.length).fill(0);

const quizArea = document.getElementById('quizArea');
const progress = document.getElementById('progress');

function renderProgress(){
  progress.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    let cls = 'clip';
    if (answered[i]) cls += earned[i] > 0 ? ' done' : ' miss';
    if (i === current) cls += ' active';
    d.className = cls;
    d.textContent = i + 1;
    progress.appendChild(d);
  });
}

function renderQuestion(){
  renderProgress();
  const q = questions[current];
  if (q.type === 'punct') renderPunct(q);
  else if (q.type === 'mcq') renderMcq(q);
  else if (q.type === 'match') renderMatch(q);
  else if (q.type === 'transform') renderTransform(q);
}

/* ---- punctuation question ---- */
function renderPunct(q){
  quizArea.innerHTML = `
    <div class="card">
      <div class="qnum">Задание ${current + 1} из ${questions.length}</div>
      <p class="qtext">${q.q}</p>
      <div class="ptext" id="ptextBox">${buildPunctuationHtml()}</div>
      <div class="feedback" id="fb"></div>
      <div class="nav">
        <button class="btn" id="checkBtn">Проверить</button>
        <button class="btn" id="nextBtn" disabled>Далее →</button>
      </div>
    </div>
  `;
  if (answered[current]) {
    lockPunct(true);
  } else {
    document.querySelectorAll('#ptextBox .slot').forEach(s => {
      s.addEventListener('click', () => {
        s.classList.toggle('selected');
        s.textContent = s.classList.contains('selected') ? ',' : '⌄';
      });
    });
    document.getElementById('checkBtn').onclick = () => checkPunct(q);
  }
}

function checkPunct(q){
  const slots = document.querySelectorAll('#ptextBox .slot');
  let correctCount = 0, wrongCount = 0, missedCount = 0;
  slots.forEach(s => {
    const correct = s.dataset.correct === 'true';
    const selected = s.classList.contains('selected');
    if (correct && selected) { s.classList.add('ok'); s.textContent = ','; correctCount++; }
    else if (!correct && selected) { s.classList.add('wrong'); s.textContent = ','; wrongCount++; }
    else if (correct && !selected) { s.classList.add('missed'); s.textContent = ','; missedCount++; }
    else { s.textContent = ''; }
  });
  const pts = correctCount; // points = correctly placed commas (out of needed ones), wrong/missed reduce implicitly via feedback
  earned[current] = Math.max(0, pts - Math.floor(wrongCount/2));
  totalScore += earned[current];
  answered[current] = true;
  lockPunct(false, correctCount, wrongCount, missedCount);
}

function lockPunct(alreadyDone, correctCount, wrongCount, missedCount){
  document.getElementById('checkBtn').remove ? null : null;
  const checkBtn = document.getElementById('checkBtn');
  if (checkBtn) checkBtn.disabled = true;
  const fb = document.getElementById('fb');
  fb.classList.add('show');
  if (alreadyDone) {
    fb.classList.add('ok');
    fb.textContent = "Это задание уже проверено.";
  } else {
    const needed = Object.values(slotMap).filter(v => v).length;
    let cls = 'ok';
    if (wrongCount > 0 || missedCount > 0) cls = (correctCount > 0 ? 'mid' : 'bad');
    fb.classList.add(cls);
    fb.innerHTML = `Верно поставлено запятых: <b>${correctCount}</b> из <b>${needed}</b>. ` +
      (wrongCount > 0 ? `Лишних запятых: <b>${wrongCount}</b>. ` : '') +
      (missedCount > 0 ? `Пропущено (отмечено золотым): <b>${missedCount}</b>.` : (wrongCount === 0 ? ' Отлично, все запятые на месте!' : ''));
  }
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').onclick = goNext;
}

/* ---- mcq question ---- */
function renderMcq(q){
  quizArea.innerHTML = `
    <div class="card">
      <div class="qnum">Задание ${current + 1} из ${questions.length}</div>
      <p class="qtext">${q.q}</p>
      <div id="opts"></div>
      <div class="feedback" id="fb"></div>
      <div class="nav" style="justify-content:flex-end;">
        <button class="btn" id="nextBtn" disabled>${current === questions.length - 1 ? 'Узнать результат' : 'Далее →'}</button>
      </div>
    </div>
  `;
  const optsWrap = document.getElementById('opts');
  q.opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = opt;
    b.onclick = () => selectMcq(i, q);
    optsWrap.appendChild(b);
  });
  if (answered[current]) lockMcq(q.userChoice, q);
}

function selectMcq(i, q){
  if (answered[current]) return;
  q.userChoice = i;
  answered[current] = true;
  if (i === q.correct) { earned[current] = q.points; totalScore += q.points; }
  lockMcq(i, q);
}

function lockMcq(chosenIndex, q){
  const buttons = document.querySelectorAll('#opts .opt');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    if (i === chosenIndex && chosenIndex !== q.correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  const isCorrect = chosenIndex === q.correct;
  fb.classList.add('show', isCorrect ? 'ok' : 'bad');
  fb.textContent = isCorrect ? q.fb.ok : q.fb.bad;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').onclick = goNext;
}

/* ---- matching question ---- */
function renderMatch(q){
  const types = ["Согласование", "Управление", "Примыкание"];
  quizArea.innerHTML = `
    <div class="card">
      <div class="qnum">Задание ${current + 1} из ${questions.length}</div>
      <p class="qtext">${q.q}</p>
      ${q.hint ? `<p class="qhint">${q.hint}</p>` : ''}
      <div id="matchRows"></div>
      <div class="feedback" id="fb"></div>
      <div class="nav">
        <button class="btn" id="checkBtn">Проверить</button>
        <button class="btn" id="nextBtn" disabled>Далее →</button>
      </div>
    </div>
  `;
  const rows = document.getElementById('matchRows');
  q.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'mrow';
    row.innerHTML = `
      <div class="mphrase">«${item.phrase}»</div>
      <div class="mbtns" data-idx="${idx}">
        ${types.map(t => `<button class="mbtn" data-type="${t}">${t}</button>`).join('')}
      </div>
      <div class="mnote" id="mnote-${idx}"></div>
    `;
    rows.appendChild(row);
  });

  if (answered[current]) {
    lockMatch(q, types, true);
  } else {
    document.querySelectorAll('.mbtns').forEach(group => {
      group.querySelectorAll('.mbtn').forEach(btn => {
        btn.addEventListener('click', () => {
          group.querySelectorAll('.mbtn').forEach(b => b.classList.remove('picked'));
          btn.classList.add('picked');
          const idx = group.dataset.idx;
          q.items[idx].userPick = btn.dataset.type;
        });
      });
    });
    document.getElementById('checkBtn').onclick = () => {
      answered[current] = true;
      lockMatch(q, types, false);
    };
  }
}

function lockMatch(q, types, alreadyDone){
  let correctCount = 0;
  document.querySelectorAll('.mbtns').forEach(group => {
    const idx = group.dataset.idx;
    const item = q.items[idx];
    group.querySelectorAll('.mbtn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.type === item.correct) btn.classList.add('ok');
      if (btn.classList.contains('picked') && btn.dataset.type !== item.correct) btn.classList.add('wrong');
    });
    if (item.userPick === item.correct) correctCount++;
    else {
      const note = document.getElementById('mnote-' + idx);
      note.classList.add('show');
      note.textContent = `Правильный ответ: ${item.correct}`;
    }
  });
  document.getElementById('checkBtn').disabled = true;
  if (!alreadyDone) {
    earned[current] = correctCount;
    totalScore += correctCount;
  }
  const fb = document.getElementById('fb');
  fb.classList.add('show', correctCount === q.items.length ? 'ok' : 'mid');
  fb.innerHTML = `Правильно определено: <b>${correctCount}</b> из <b>${q.items.length}</b>.`;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').onclick = goNext;
}

/* ---- transform question (self-graded) ---- */
function renderTransform(q){
  quizArea.innerHTML = `
    <div class="card">
      <div class="qnum">Задание ${current + 1} из ${questions.length}</div>
      <p class="qtext">${q.q}</p>
      <div id="transRows"></div>
      <div class="feedback" id="fb"></div>
      <div class="nav">
        <button class="btn" id="nextBtn" disabled>${current === questions.length - 1 ? 'Узнать результат' : 'Далее →'}</button>
      </div>
    </div>
  `;
  const rows = document.getElementById('transRows');
  q.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'trow';
    row.innerHTML = `
      <div class="tphrase">«${item.phrase}» <span class="ttype">(${item.fromType})</span> → <span class="ttype target">${item.toType}</span></div>
      <input type="text" class="tinput" id="tinput-${idx}" placeholder="Ваш вариант...">
      <div class="trow-controls">
        <button class="reveal-sample" id="reveal-${idx}">Показать пример ответа</button>
        <span class="sample" id="sample-${idx}"></span>
      </div>
      <div class="self-grade" id="grade-${idx}">
        <button class="gbtn ok" data-val="1">✓ Получилось</button>
        <button class="gbtn bad" data-val="0">✗ Не получилось</button>
      </div>
    `;
    rows.appendChild(row);
  });

  if (answered[current]) {
    lockTransform(q, true);
  } else {
    q.items.forEach((item, idx) => {
      document.getElementById('reveal-' + idx).onclick = () => {
        const s = document.getElementById('sample-' + idx);
        s.textContent = `Пример: «${item.sample}»`;
        s.classList.add('show');
      };
      document.querySelectorAll(`#grade-${idx} .gbtn`).forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll(`#grade-${idx} .gbtn`).forEach(b => b.classList.remove('picked'));
          btn.classList.add('picked');
          item.selfGrade = btn.dataset.val === '1';
          maybeFinishTransform(q);
        };
      });
    });
  }
}

function maybeFinishTransform(q){
  const allGraded = q.items.every(it => it.selfGrade !== undefined);
  if (!allGraded || answered[current]) return;
  answered[current] = true;
  lockTransform(q, false);
}

function lockTransform(q, alreadyDone){
  q.items.forEach((item, idx) => {
    document.getElementById('tinput-' + idx).disabled = true;
    document.querySelectorAll(`#grade-${idx} .gbtn`).forEach(btn => { btn.disabled = true; });
    if (item.selfGrade === true) document.querySelector(`#grade-${idx} .gbtn.ok`).classList.add('picked');
    if (item.selfGrade === false) document.querySelector(`#grade-${idx} .gbtn.bad`).classList.add('picked');
    const s = document.getElementById('sample-' + idx);
    s.textContent = `Пример: «${item.sample}»`;
    s.classList.add('show');
  });
  const correctCount = q.items.filter(it => it.selfGrade).length;
  if (!alreadyDone) {
    earned[current] = correctCount;
    totalScore += correctCount;
  }
  const fb = document.getElementById('fb');
  fb.classList.add('show', correctCount === q.items.length ? 'ok' : 'mid');
  fb.innerHTML = `Вы отметили выполненными: <b>${correctCount}</b> из <b>${q.items.length}</b>.`;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').onclick = goNext;
}

/* ---- navigation ---- */
function goNext(){
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  quizArea.innerHTML = '';
  renderProgress();
  const card = document.getElementById('resultCard');
  card.classList.remove('hidden');
  const pct = Math.round((totalScore / totalMaxPoints) * 100);
  let grade = 2, text = '';
  if (pct >= 90) { grade = 5; text = 'Великолепно! Вы уверенно владеете пунктуацией, синтаксисом и видами связи в словосочетаниях.'; }
  else if (pct >= 75) { grade = 4; text = 'Хороший результат. Есть отдельные неточности — посмотрите, где именно потеряны баллы.'; }
  else if (pct >= 55) { grade = 3; text = 'Средний результат. Стоит повторить пунктуацию при обособленных оборотах и виды подчинительной связи.'; }
  else { grade = 2; text = 'Нужно вернуться к теории: обособление оборотов, типы связи в словосочетаниях и нормы ударения.'; }
  document.getElementById('stampGrade').textContent = grade;
  document.getElementById('scoreLine').textContent = `Баллов набрано: ${totalScore} из ${totalMaxPoints} (${pct}%)`;
  document.getElementById('resultText').textContent = text;
  try { localStorage.setItem('result_test_grammatika_dubrovsky', JSON.stringify({ grade, score: totalScore, maxScore: totalMaxPoints, pct, date: Date.now() })); } catch(e) {}
}

document.getElementById('retryBtn').onclick = () => {
  current = 0; totalScore = 0;
  answered.fill(false);
  earned.fill(0);
  questions.forEach(q => {
    delete q.userChoice;
    if (q.items) q.items.forEach(it => { delete it.userPick; delete it.selfGrade; });
  });
  document.getElementById('resultCard').classList.add('hidden');
  renderQuestion();
};

renderQuestion();
</script>
