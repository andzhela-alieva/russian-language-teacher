<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задания — Анджела Кузьмина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:    #f3f1e8;
      --rule:     #c9d6e3;
      --margin:   #e2a3a0;
      --ink:      #233047;
      --ink-soft: #4b5a73;
      --red:      #b5392f;
      --red-dark: #8c2a22;
      --green:    #3f7a4f;
      --green-dark: #2d5e3a;
      --pencil:   #665f56;
      --gold:     #b9912f;
      --blue:     #2c5f8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: repeating-linear-gradient(var(--paper) 0px, var(--paper) 33px, var(--rule) 34px);
      background-color: var(--paper);
      font-family: 'PT Serif', serif;
      color: var(--ink);
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      padding: 28px 28px 50px 64px;
      min-height: 100vh;
    }

    .margin-line {
      position: absolute;
      left: 42px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--margin);
      pointer-events: none;
    }

    header { margin-bottom: 18px; }

    .eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--pencil);
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 40px;
      line-height: 1.05;
      margin: 4px 0 6px;
    }

    .subtitle {
      color: var(--ink-soft);
      font-style: italic;
      font-size: 15px;
      margin: 0;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin: 22px 0 24px;
    }

    .search-input {
      width: 100%;
      font-family: 'PT Serif', serif;
      font-size: 16px;
      color: var(--ink);
      background: rgba(255,255,255,.6);
      border: 1.5px solid var(--rule);
      border-radius: 3px;
      padding: 9px 38px 9px 14px;
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--ink-soft); }
    .search-input::placeholder { color: var(--pencil); font-style: italic; }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--pencil);
      font-family: 'Courier Prime', monospace;
      font-size: 15px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }
    .search-clear:hover { color: var(--ink); }
    .task-card:focus-visible, .search-clear:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .search-input:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 14px; }

    .task-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,.55);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 18px 20px 16px;
      transition: border-color .15s;
    }
    .task-card:hover { border-color: var(--ink-soft); }
    .done-mark {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 15px;
      color: var(--green);
      margin-left: 5px;
    }
    .task-card.hidden { display: none; }

    .task-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 11.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--pencil);
      margin-bottom: 5px;
    }

    .task-title {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.15;
      color: var(--ink);
      margin: 0 0 14px;
    }

    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-result {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Courier Prime', monospace;
      font-size: 12.5px;
      color: var(--pencil);
    }

    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2.5px solid var(--red);
      color: var(--red);
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 22px;
      transform: rotate(-5deg);
      flex-shrink: 0;
    }
    .grade-badge.green { border-color: var(--green); color: var(--green); }
    .grade-badge.gold  { border-color: var(--gold);  color: var(--gold);  }

    .result-meta {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.4;
    }

    .btn {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 19px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 3px;
      padding: 7px 20px 9px;
      transform: rotate(-0.4deg);
      display: inline-block;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s;
    }
    .task-card:hover .btn { background: var(--red-dark); }

    .no-results {
      font-style: italic;
      color: var(--pencil);
      font-size: 15px;
      display: none;
      padding: 8px 0;
    }

    footer {
      text-align: center;
      color: var(--pencil);
      font-size: 12px;
      margin-top: 26px;
      font-family: 'Courier Prime', monospace;
    }

    @media (max-width: 480px) {
      .margin-line { display: none; }
      .page { padding: 20px 16px 40px 16px; }
      .task-footer { flex-direction: column; align-items: flex-start; gap: 12px; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="margin-line"></div>

    <header>
      <div class="eyebrow">Русский язык · интерактивные задания</div>
      <h1>Задания</h1>
      <p class="subtitle">Выберите задание и нажмите «Открыть» — результат появится здесь после выполнения.</p>
    </header>

    <div class="search-wrap">
      <input class="search-input" type="search" id="searchInput"
        placeholder="Поиск по названию или теме…"
        aria-label="Поиск по заданиям"
        autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="Очистить поиск" hidden>✕</button>
    </div>

    <div class="task-list" id="taskList"></div>
    <p class="no-results" id="noResults">Ничего не найдено.</p>

    <footer>Анджела Кузьмина · русский язык</footer>
  </div>

  <script>
    const tasks = [
      {
        id: 'test_grammatika_dubrovsky',
        file: 'test_grammatika_dubrovsky.html',
        title: 'Тест по грамматическому заданию',
        eyebrow: 'Грамматика · Диктант № 4 · Дубровский',
        maxScore: 28
      },
      {
        id: 'test_szhatie_teksta',
        file: 'test_szhatie_teksta.html',
        title: 'Тема, идея и сжатие текста',
        eyebrow: 'Русский язык · Сжатое изложение · ОГЭ',
        maxScore: 10
      },
      {
        id: 'test_punktuaciya_spp',
        file: 'test_punktuaciya_spp.html',
        title: 'Запятые в сложноподчинённых предложениях',
        eyebrow: 'Пунктуация · ЕГЭ · СПП',
        maxScore: 20
      }
    ];

    function loadResult(id) {
      try {
        const raw = localStorage.getItem('result_' + id);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const sameYear = d.getFullYear() === new Date().getFullYear();
      return d.toLocaleDateString('ru-RU', {
        day: 'numeric',
        month: 'long',
        ...(sameYear ? {} : { year: 'numeric' })
      });
    }

    function gradeClass(grade) {
      if (grade >= 4) return ' green';
      if (grade === 3) return ' gold';
      return '';
    }

    function resultHTML(result, maxScore) {
      if (!result) return '<span>ещё не выполнялось</span>';
      const resolvedMax = result.maxScore != null ? result.maxScore : maxScore;
      return `<div class="grade-badge${gradeClass(result.grade)}">${result.grade}</div>` +
        `<div class="result-meta">` +
          `<span>${result.score} из ${resolvedMax} (${result.pct}%)</span>` +
          `<span>${formatDate(result.date)}</span>` +
        `</div>`;
    }

    const list = document.getElementById('taskList');
    const noResults = document.getElementById('noResults');

    if (tasks.length === 0) {
      noResults.textContent = 'Заданий пока нет.';
      noResults.style.display = 'block';
    } else {
      tasks.forEach(task => {
        const result = loadResult(task.id);
        const card = document.createElement('a');
        card.className = 'task-card' + (result ? ' done' : '');
        card.href = task.file;
        card.dataset.search = (task.title + ' ' + task.eyebrow).toLowerCase();
        const doneTag = result ? ' <span class="done-mark">✓</span>' : '';
        card.innerHTML =
          `<div class="task-eyebrow">${task.eyebrow}${doneTag}</div>` +
          `<div class="task-title">${task.title}</div>` +
          `<div class="task-footer">` +
            `<div class="task-result">${resultHTML(result, task.maxScore)}</div>` +
            `<span class="btn">Открыть →</span>` +
          `</div>`;
        list.appendChild(card);
      });
    }

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();
      searchClear.hidden = !q;
      let visible = 0;
      list.querySelectorAll('.task-card').forEach(card => {
        const match = !q || card.dataset.search.includes(q);
        card.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = (tasks.length > 0 && visible === 0) ? 'block' : 'none';
    }

    searchInput.addEventListener('input', applyFilter);

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      applyFilter();
    });
  </script>
</body>
</html>
